services:
  postgres:
    image: postgres:16-alpine
    container_name: expenseflow-postgres
    restart: unless-stopped
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-expenseflow}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-expenseflow}
      POSTGRES_DB: ${POSTGRES_DB:-expenseflow}
    ports:
      - '${POSTGRES_PORT:-5433}:5432'
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ['CMD-SHELL', 'pg_isready -U ${POSTGRES_USER:-expenseflow} -d ${POSTGRES_DB:-expenseflow}']
      interval: 5s
      timeout: 5s
      retries: 10

  redis:
    image: redis:7-alpine
    container_name: expenseflow-redis
    restart: unless-stopped
    command: ['redis-server', '--appendonly', 'yes']
    ports:
      - '${REDIS_PORT:-6379}:6379'
    volumes:
      - redis_data:/data
    healthcheck:
      test: ['CMD', 'redis-cli', 'ping']
      interval: 5s
      timeout: 3s
      retries: 10

  minio:
    image: minio/minio:latest
    container_name: expenseflow-minio
    restart: unless-stopped
    command: server /data --console-address ":9001"
    environment:
      MINIO_ROOT_USER: ${S3_ACCESS_KEY:-minioadmin}
      MINIO_ROOT_PASSWORD: ${S3_SECRET_KEY:-minioadmin}
    ports:
      - '9000:9000'
      - '9001:9001'
    volumes:
      - minio_data:/data
    healthcheck:
      test: ['CMD', 'curl', '-f', 'http://localhost:9000/minio/health/live']
      interval: 10s
      timeout: 5s
      retries: 5

  minio-init:
    image: minio/mc:latest
    container_name: expenseflow-minio-init
    depends_on:
      minio:
        condition: service_started
    entrypoint: >
      /bin/sh -c "
      sleep 3;
      mc alias set local http://minio:9000 $${MINIO_ROOT_USER:-minioadmin} $${MINIO_ROOT_PASSWORD:-minioadmin};
      mc mb --ignore-existing local/${S3_BUCKET:-expenseflow};
      exit 0;
      "
    environment:
      MINIO_ROOT_USER: ${S3_ACCESS_KEY:-minioadmin}
      MINIO_ROOT_PASSWORD: ${S3_SECRET_KEY:-minioadmin}
      S3_BUCKET: ${S3_BUCKET:-expenseflow}

  api:
    build:
      context: .
      dockerfile: backend/Dockerfile
    container_name: expenseflow-api
    restart: unless-stopped
    env_file:
      - .env
    environment:
      NODE_ENV: development
      APP_PORT: 3000
      POSTGRES_HOST: postgres
      REDIS_HOST: redis
      S3_ENDPOINT: http://minio:9000
      CORS_ORIGINS: ${CORS_ORIGINS:-http://localhost,http://localhost:5173,http://localhost:8080}
    ports:
      - '${API_PORT:-3000}:3000'
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    profiles:
      - full

  worker:
    build:
      context: .
      dockerfile: worker/Dockerfile
    container_name: expenseflow-worker
    restart: unless-stopped
    env_file:
      - .env
    environment:
      REDIS_HOST: redis
      API_BASE_URL: http://api:3000/api/v1
    depends_on:
      redis:
        condition: service_healthy
    profiles:
      - full

  bot:
    build:
      context: .
      dockerfile: telegram-bot/Dockerfile
    container_name: expenseflow-bot
    restart: unless-stopped
    env_file:
      - .env
    environment:
      API_BASE_URL: http://api:3000/api/v1
    depends_on:
      - api
    profiles:
      - full

  web:
    build:
      context: .
      dockerfile: frontend/Dockerfile
    container_name: expenseflow-web
    restart: unless-stopped
    profiles:
      - full

  nginx:
    image: nginx:1.27-alpine
    container_name: expenseflow-nginx
    restart: unless-stopped
    ports:
      - '${NGINX_PORT:-8080}:80'
    volumes:
      - ./nginx/conf.d/default.conf:/etc/nginx/conf.d/default.conf:ro
    depends_on:
      - api
      - web
    profiles:
      - full

volumes:
  postgres_data:
  redis_data:
  minio_data:
