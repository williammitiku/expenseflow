# Used when the Railway service Root Directory is the monorepo root (`/`).
# Create two services from the same repo:
#   1) API  — this file / backend/Dockerfile
#   2) Bot  — telegram-bot/railway.toml + telegram-bot/Dockerfile

[build]
builder = "DOCKERFILE"
dockerfilePath = "backend/Dockerfile"

[deploy]
healthcheckPath = "/api/v1/health"
healthcheckTimeout = 100
restartPolicyType = "ON_FAILURE"
restartPolicyMaxRetries = 5
